[about]
header = "About Wdes SAS"
content = """
Wdes SAS is a French company specialising in open-source software, infrastructure engineering, and AI consulting.
We build tools in <strong>Rust</strong>, <strong>PHP</strong>, and <strong>TypeScript</strong> used by thousands of developers worldwide.<br>
Wdes ® is a registered trademark on <a href="https://data.inpi.fr/marques/FR4828955?q=Wdes#FR4828955" target="_blank" rel="noopener">INPI</a>.
"""

[about.projects.code-lts]
header = "Code LTS"
content = """
Maintain and modernise legacy code so it keeps running safely.
Projects like <strong>Doctum</strong> (350+ ★) and the <strong>jQuery Fullscreen Plugin</strong> (330+ ★) are used across the ecosystem.<br>
<a href="https://github.com/code-lts" target="_blank" rel="noopener">GitHub</a>
"""

[about.projects.sudo-bot]
header = "Sudo-Bot"
content = """
A suite of <strong>GitHub Actions</strong> and Docker images for CI/CD: PR merge, fork sync, Docker signing, Scrutinizer coverage, and more.<br>
<a href="https://github.com/sudo-bot" target="_blank" rel="noopener">GitHub</a>
"""

[about.projects.mail]
header = "Mail Autodiscover"
content = """
A Rust-powered Docker image for dynamic <strong>Autodiscover &amp; Autoconfig</strong> — supports Outlook, Thunderbird, Apple, and Android.<br>
<a href="https://github.com/wdes/mail-autodiscover-autoconfig" target="_blank" rel="noopener">GitHub</a> (25+ ★)
"""

[about.projects.wdes]
header = "Wdes"
content = """
Our home for tools and libraries in PHP, TypeScript, and <a href="https://www.rust-lang.org/" target="_blank" rel="noopener">Rust</a>: DNS tooling, security auditing, infrastructure monitoring, and more.<br>
<a href="https://github.com/wdes" target="_blank" rel="noopener">GitHub</a>
"""

[services]
header = "Services"
content = "What we can do for your business"

[services.ai]
title = "AI Consulting"
content = "We help companies adopt AI effectively — from integrating LLMs into your workflows to improving the quality of AI-generated output through better prompting, fine-tuning, and review processes."

[services.dev]
title = "Software Development"
content = "Full-stack development in PHP, Rust, TypeScript, and Angular. We build robust, maintainable software for web and backend systems."

[services.lts]
title = "Long-Term Support"
content = "Legacy code holding you back? We migrate, modernise, and maintain aging codebases so you can move forward without starting over."

[services.infra]
title = "Infrastructure"
content = "Server setup, network architecture, OS migrations, mail infrastructure, monitoring, and containerised deployments with Docker."

