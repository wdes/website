[index-page]
desc = "Wdes SAS — Ingénierie open-source, infrastructure et conseil en IA, basée en France."

[head]
title = "Bienvenue chez Wdes SAS"
motd = "Logiciel open-source, infrastructure et IA — conçus avec soin"

[menu]
home = "Accueil"
about = "À propos"
projects = "Projets"
services = "Services"

[about]
header = "À propos de Wdes SAS"
content = """
Wdes SAS est une entreprise française spécialisée dans le logiciel open-source, l'ingénierie d'infrastructure et le conseil en IA.
Nous développons des outils en <strong>Rust</strong>, <strong>PHP</strong> et <strong>TypeScript</strong> utilisés par des milliers de développeurs dans le monde.<br>
Wdes ® est une marque déposée à l'<a href="https://data.inpi.fr/marques/FR4828955?q=Wdes#FR4828955" target="_blank" rel="noopener">INPI</a>.
"""

[about.projects.code-lts]
header = "Code LTS"
content = """
Maintenir et moderniser du code legacy pour qu'il continue à fonctionner en toute sécurité.
Des projets comme <strong>Doctum</strong> (350+ ★) et le <strong>jQuery Fullscreen Plugin</strong> (330+ ★) sont largement utilisés.<br>
<a href="https://github.com/code-lts" target="_blank" rel="noopener">GitHub</a>
"""

[about.projects.sudo-bot]
header = "Sudo-Bot"
content = """
Une suite d'<strong>Actions GitHub</strong> et d'images Docker pour le CI/CD : merge de PR, synchronisation de forks, signature Docker, couverture Scrutinizer, et bien plus.<br>
<a href="https://github.com/sudo-bot" target="_blank" rel="noopener">GitHub</a>
"""

[about.projects.mail]
header = "Mail Autodiscover"
content = """
Une image Docker en Rust pour la configuration dynamique <strong>Autodiscover &amp; Autoconfig</strong> — compatible Outlook, Thunderbird, Apple et Android.<br>
<a href="https://github.com/wdes/mail-autodiscover-autoconfig" target="_blank" rel="noopener">GitHub</a> (25+ ★)
"""

[about.projects.wdes]
header = "Wdes"
content = """
Notre espace pour les outils et bibliothèques en PHP, TypeScript et <a href="https://www.rust-lang.org/fr" target="_blank" rel="noopener">Rust</a> : outillage DNS, audit de sécurité, supervision d'infrastructure, et plus.<br>
<a href="https://github.com/wdes" target="_blank" rel="noopener">GitHub</a>
"""

[services]
header = "Services"
content = "Ce que nous pouvons faire pour votre entreprise"

[services.ai]
title = "Conseil en IA"
content = "Nous aidons les entreprises à adopter l'IA efficacement — de l'intégration de LLMs dans vos processus à l'amélioration de la qualité des résultats produits par l'IA grâce au prompting, au fine-tuning et à la revue."

[services.dev]
title = "Développement logiciel"
content = "Développement full-stack en PHP, Rust, TypeScript et Angular. Nous concevons des logiciels robustes et maintenables pour le web et le backend."

[services.lts]
title = "Support à long terme"
content = "Du code legacy vous freine ? Nous migrons, modernisons et maintenons les bases de code vieillissantes pour que vous puissiez avancer sans tout repartir de zéro."

[services.infra]
title = "Infrastructure"
content = "Mise en place de serveurs, architecture réseau, migrations d'OS, infrastructure mail, supervision et déploiements conteneurisés avec Docker."

