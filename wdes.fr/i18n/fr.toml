[about]
header = "À propos de Wdes SAS"
content = """
Wdes SAS est une entreprise française spécialisée dans le logiciel open-source, l'ingénierie d'infrastructure et le conseil en IA.
Nous développons des outils en <strong>Rust</strong> et <strong>PHP</strong>, et nous réalisons du <strong>packaging Debian</strong> pour des milliers d'utilisateurs dans le monde.<br>
Wdes ® est une marque déposée à l'<a href="https://data.inpi.fr/marques/FR4828955?q=Wdes#FR4828955" target="_blank" rel="noopener">INPI</a>.
"""

[projects]
header = "Projets phares"
content = "Des outils open-source utilisés par des développeurs dans le monde entier"

[projects.doctum]
title = "Doctum"
desc = "Générateur de documentation d'API PHP, fork de Sami activement maintenu."
lang = "PHP"
url = "https://github.com/code-lts/doctum"

[projects.mail-autodiscover]
title = "Mail Autodiscover"
desc = "Image Docker en Rust pour la configuration dynamique Autodiscover &amp; Autoconfig. Compatible Outlook, Thunderbird, Apple, Android."
lang = "Rust"
url = "https://github.com/wdes/mail-autodiscover-autoconfig"

[projects.security]
title = "Outils de sécurité"
desc = "Outils d'audit de sécurité et de gestion des vulnérabilités écrits en Rust."
lang = "Rust"
url = "https://github.com/wdes/security"

[projects.phpmyadmin]
title = "phpMyAdmin"
desc = "L'outil d'administration MySQL/MariaDB en ligne de référence. Nous assurons la maintenance et les releases."
lang = "PHP"
url = "https://www.phpmyadmin.net/"

[projects.debian]
title = "Mainteneur Debian"
desc = "Mainteneur officiel de paquets Debian — packaging et maintenance de logiciels dans l'archive Debian pour des millions d'utilisateurs."
lang = "Debian"
url = "https://qa.debian.org/developer.php?login=williamdes@wdes.fr"

[projects.action-pr-merge]
title = "Action PR Merge"
desc = "Une Action GitHub écrite en Rust pour fusionner automatiquement les pull requests lorsqu'un label spécifique est ajouté."
lang = "Rust"
url = "https://github.com/sudo-bot/action-pull-request-merge"

